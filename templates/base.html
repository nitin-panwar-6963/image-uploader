<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Upload App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <h1>📸 ImageApp</h1>
    <div>
        {% if request.session.user %}
            <a href="/dashboard/">Dashboard</a>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/">Login</a>
            <a href="/register/">Register</a>
        {% endif %}
    </div>
</nav>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
