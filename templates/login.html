{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Welcome Back 👋</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button>Login</button>
    </form>

    <p class="link">No account? <a href="/register/">Create one</a></p>
</div>
{% endblock %}
